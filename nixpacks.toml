[phases.setup]
nixpacksArchive = "latest"
aptPkgs = ["php8.2-mysqli", "php8.2-gd", "php8.2-mbstring", "php8.2-xml", "php8.2-curl", "mysql-client"]

[phases.install]
# Lệnh này dùng để cài đặt extension trực tiếp cho PHP
cmds = ["apt-get update && apt-get install -y php-mysqli php-gd php-xml"]

[variables]
# Định nghĩa các extension cần nạp cho FrankenPHP/Nixpacks
NIXPACKS_PHP_FALLBACK_VERSION = "8.2"
PHP_EXTENSIONS = "mysqli,gd,mbstring,xml,curl"

[start]
# Đảm bảo chạy đúng lệnh khởi động của FrankenPHP nếu có
cmd = "php -S 0.0.0.0:$PORT index.php"
